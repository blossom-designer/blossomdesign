<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossom | Lotus — Дизайн и Визуализация</title>
    <style>
        /* Темная неоновая палитра сайта */
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: linear-gradient(145deg, #1a1a1a, #252525);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --neon-pink: #ff2a6d;
            --neon-purple: #b10dc9;
            --border-dark: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            line-height: 1.7;
            scroll-behavior: smooth;
            background-color: var(--bg-dark);
            overflow-x: hidden;
            position: relative;
        }

        /* Неоновое свечение по бокам снизу */
        body::before, body::after {
            content: '';
            position: fixed;
            bottom: -100px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.35;
            pointer-events: none;
        }

        body::before {
            left: -150px;
            background-color: var(--neon-pink);
        }

        body::after {
            right: -150px;
            background-color: var(--neon-purple);
        }

        /* Навигация */
        header {
            background-color: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-dark);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--neon-pink);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 42, 109, 0.5);
        }

        .nav-links a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .nav-links a:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 42, 109, 0.6);
        }

        /* Главный экран */
        .hero {
            padding: 220px 20px 140px; 
            text-align: center;
            border-bottom: 1px solid var(--border-dark);
            position: relative;
            z-index: 1; 
            overflow: hidden; 
        }

        /* Изображение на заднем фоне */
        .hero-bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 600px;
            z-index: -1;
            opacity: 0.4; 
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 70%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 70%);
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: var(--text-main);
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9); 
            position: relative;
            z-index: 2;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto 40px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 2;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            color: #ffffff;
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 42, 109, 0.3);
            border: none;
            position: relative;
            z-index: 2;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(177, 13, 201, 0.5);
        }

        /* Секции */
        .section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Фон для секции с опытом */
        #experience::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Lotos.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: -1;
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 20%, rgba(0,0,0,0) 80%);
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 60px;
            color: var(--text-main);
        }

        /* Сетка карточек */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-dark);
            transition: transform 0.4s ease, grid-column 0.3s ease, box-shadow 0.4s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 42, 109, 0.15);
            border-color: rgba(255, 42, 109, 0.4);
        }

        /* Интерактивная карточка */
        .card.expandable {
            cursor: pointer;
            position: relative;
        }

        .card.expandable::after {
            content: 'Нажмите, чтобы развернуть кейс';
            display: block;
            font-size: 0.8rem;
            color: var(--neon-pink);
            margin-top: auto;
            padding-top: 15px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .card.expandable.expanded::after {
            content: 'Свернуть';
        }

        .card.expanded {
            grid-column: 1 / -1;
            transform: translateY(0);
            cursor: default;
        }
        
        .card.expanded:hover {
            transform: translateY(0); 
        }

        /* Скрытый контент */
        .expanded-content {
